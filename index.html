<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kivo Ultra V9 | معاذ ابوصبيع</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --kivo-blue: #0088cc;
            --bg: #0b141a;
            --card: #111b21;
            --text: #e9edef;
            --dim: #8696a0;
            --sent: #005c4b;
            --received: #202c33;
            --online: #00ffcc;
            --danger: #ef4444;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Cairo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); height: 100vh; overflow: hidden; }

        /* شاشة تسجيل الدخول المميزة */
        #authView { position: fixed; inset: 0; background: var(--bg); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 25px; transition: 0.5s; }
        .auth-card { background: var(--card); width: 100%; max-width: 380px; padding: 40px 30px; border-radius: 30px; text-align: center; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        .view { height: 100vh; display: none; padding: 20px 20px 100px; overflow-y: auto; }
        .view.active { display: block; animation: smoothSlideIn 0.4s ease-out; }
        @keyframes smoothSlideIn { from { transform: translateX(30px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        .item-card { background: var(--card); padding: 15px; border-radius: 15px; margin-bottom: 12px; display: flex; align-items: center; justify-content: space-between; border-right: 4px solid var(--kivo-blue); cursor: pointer; }
        
        #chatWindow { position: fixed; inset: 0; background: var(--bg); z-index: 2000; display: flex; flex-direction: column; transform: translateX(100%); transition: transform 0.35s cubic-bezier(0.25, 1, 0.5, 1); }
        #chatWindow.open { transform: translateX(0); }
        
        .chat-msgs { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .bubble { max-width: 80%; padding: 12px; border-radius: 15px; margin-bottom: 10px; position: relative; }
        .sent { align-self: flex-start; background: var(--sent); }
        .received { align-self: flex-end; background: var(--received); }
        .bubble img { max-width: 100%; border-radius: 10px; margin-top: 8px; }

        .btn { width: 100%; padding: 15px; border-radius: 15px; border: none; font-weight: bold; cursor: pointer; background: var(--kivo-blue); color: white; font-size: 1.1rem; }
        .btn-sub { background: #2a3942; color: var(--kivo-blue); width: auto; padding: 8px 18px; border-radius: 10px; }
        .btn-sub.active { background: var(--kivo-blue); color: white; }

        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); display: flex; justify-content: space-around; padding: 15px 0 30px; border-top: 1px solid #333; z-index: 1000; }
        .nav-item { color: var(--dim); text-align: center; font-size: 0.8rem; cursor: pointer; }
        .nav-item.active { color: var(--kivo-blue); }
        .nav-item i { font-size: 1.8rem; display: block; margin-bottom: 5px; }
        
        .add-btn { position: fixed; bottom: 110px; left: 20px; width: 60px; height: 60px; background: var(--kivo-blue); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 1.8rem; z-index: 900; }

        input { width: 100%; padding: 15px; border-radius: 15px; border: none; background: #2a3942; color: white; margin-bottom: 15px; font-size: 1rem; outline: none; }
        
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 4500; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal.open { display: flex; }
        .modal-content { background: var(--card); width: 100%; max-width: 340px; padding: 30px; border-radius: 25px; text-align: center; }
    </style>
</head>
<body>

    <div id="authView">
        <div class="auth-card">
            <h1 style="color:var(--kivo-blue); font-size:2.5rem; font-weight:900; margin-bottom:10px;">KIVO</h1>
            <p style="color:var(--dim); margin-bottom:30px;">نظام تواصل آمن ومتطور</p>
            <input type="text" id="regUsername" placeholder="اسم المستخدم (بالإنجليزي)">
            <button class="btn" onclick="Kivo.handleAuth()">دخول النظام</button>
        </div>
    </div>

    <div id="appBody" style="display:none;">
        <div id="viewExplore" class="view active">
            <h2 style="margin-bottom:20px; font-size:2rem;">القنوات</h2>
            <div id="channelsGrid"></div>
            <div class="add-btn" onclick="Kivo.openModal('createModal')"><i class="fas fa-plus"></i></div>
        </div>

        <div id="viewMail" class="view">
            <h2 style="margin-bottom:20px; font-size:2rem;">بريدك</h2>
            <div id="mailList"></div>
        </div>

        <div id="viewTrend" class="view">
            <h2 style="margin-bottom:20px; font-size:2rem;">التريند 🔥</h2>
            <div id="trendGrid"></div>
        </div>

        <div id="viewProfile" class="view">
            <div style="text-align:center; padding:20px;">
                <div id="my_p_img" style="width:120px; height:120px; border-radius:50%; background:var(--kivo-blue); margin:0 auto 15px; overflow:hidden; border:4px solid var(--card);"></div>
                <h2 id="my_p_name" style="font-size:2rem;">تحميل...</h2>
            </div>
            <input type="text" id="in_name" placeholder="الاسم الظاهر">
            <input type="text" id="in_img" placeholder="رابط صورتك المباشر">
            <button class="btn" onclick="Kivo.saveProfile()">تحديث الملف</button>
        </div>

        <nav class="bottom-nav">
            <div class="nav-item active" onclick="Kivo.switchView('Explore', this)"><i class="fas fa-compass"></i>اكتشف</div>
            <div class="nav-item" onclick="Kivo.switchView('Mail', this)"><i class="fas fa-comment-dots"></i>بريدك</div>
            <div class="nav-item" onclick="Kivo.switchView('Trend', this)"><i class="fas fa-fire"></i>تريند</div>
            <div class="nav-item" onclick="Kivo.switchView('Profile', this)"><i class="fas fa-user-ninja"></i>حسابي</div>
        </nav>
    </div>

    <div id="chatWindow">
        <div style="padding:20px; background:var(--card); display:flex; align-items:center; gap:15px; border-bottom:1px solid #333;">
            <i class="fas fa-arrow-right" onclick="Kivo.closeChat()" style="font-size:1.5rem; cursor:pointer;"></i>
            <h3 id="chatTitle">المحادثة</h3>
        </div>
        <div class="chat-msgs" id="chatMsgs"></div>
        <div style="padding:15px 20px; background:var(--card); display:flex; gap:12px; align-items:center;">
            <i class="fas fa-image" style="font-size:1.8rem; color:var(--kivo-blue); cursor:pointer;" onclick="document.getElementById('imgUpload').click()"></i>
            <input type="file" id="imgUpload" accept="image/*" style="display:none;" onchange="Kivo.sendImage(event)">
            <input type="text" id="msgInput" placeholder="رسالتك..." style="margin:0; flex:1;">
            <button onclick="Kivo.sendTextMsg()" style="background:var(--kivo-blue); border:none; width:55px; height:55px; border-radius:15px; color:white; font-size:1.5rem;"><i class="fas fa-paper-plane"></i></button>
        </div>
    </div>

    <div id="createModal" class="modal">
        <div class="modal-content">
            <h3>إنشاء قناة جديدة</h3><br>
            <input type="text" id="newChanName" placeholder="اسم القناة">
            <button class="btn" onclick="Kivo.confirmCreateChan()">تأكيد</button>
            <button onclick="Kivo.closeModal('createModal')" style="background:none; border:none; color:var(--dim); margin-top:15px;">إلغاء</button>
        </div>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://kivo3-383ef-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const Kivo = {
            user: JSON.parse(localStorage.getItem('kivo_secure_v9')) || null,
            activeID: null,
            isPrivate: false,

            init() {
                if(this.user) {
                    document.getElementById('authView').style.display = 'none';
                    document.getElementById('appBody').style.display = 'block';
                    this.updateStatus(true);
                    this.loadChannels();
                    this.loadMail();
                    this.loadMyProfile();
                }
            },

            handleAuth() {
                const username = document.getElementById('regUsername').value.trim().toLowerCase();
                if(!username || username.length < 3) return alert("الرجاء إدخال اسم مستخدم صحيح");
                
                db.ref('users/' + username).once('value', s => {
                    if(!s.exists()) {
                        db.ref('users/' + username).set({ username, name: username, online: true });
                    }
                    this.user = { username };
                    localStorage.setItem('kivo_secure_v9', JSON.stringify(this.user));
                    this.init();
                });
            },

            updateStatus(online) {
                if(this.user) {
                    db.ref('users/' + this.user.username + '/online').set(online);
                    if(online) db.ref('users/' + this.user.username + '/online').onDisconnect().set(false);
                }
            },

            openModal(id) { document.getElementById(id).classList.add('open'); },
            closeModal(id) { document.getElementById(id).classList.remove('open'); },

            switchView(view, el) {
                document.querySelectorAll('.view').forEach(v => v.classList.remove('active'));
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                document.getElementById('view' + view).classList.add('active');
                el.classList.add('active');
                if(view === 'Trend') this.loadTrending();
            },

            confirmCreateChan() {
                const name = document.getElementById('newChanName').value.trim();
                if(!name) return;
                const id = 'ch_' + Date.now();
                db.ref('channels/' + id).set({ id, name, creator: this.user.username, subCount: 0 });
                this.closeModal('createModal');
            },

            loadChannels() {
                db.ref('channels').on('value', s => {
                    const grid = document.getElementById('channelsGrid');
                    grid.innerHTML = '';
                    s.forEach(child => {
                        const c = child.val();
                        db.ref(`subs/${this.user.username}/${c.id}`).once('value', sub => {
                            const isSub = sub.exists();
                            grid.innerHTML += `
                                <div class="item-card" onclick="Kivo.openChat('${c.id}', '${c.name}', false)">
                                    <div><strong>${c.name}</strong><br><small>${c.subCount || 0} مشترك</small></div>
                                    <button class="btn-sub ${isSub ? 'active' : ''}" onclick="event.stopPropagation(); Kivo.toggleSub('${c.id}', ${isSub})">
                                        ${isSub ? 'تم الاشتراك' : 'اشتراك'}
                                    </button>
                                </div>`;
                        });
                    });
                });
            },

            toggleSub(id, isSub) {
                if(isSub) {
                    db.ref(`subs/${this.user.username}/${id}`).remove();
                    db.ref(`channels/${id}/subCount`).transaction(c => Math.max((c || 0) - 1, 0));
                } else {
                    db.ref(`subs/${this.user.username}/${id}`).set(true);
                    db.ref(`channels/${id}/subCount`).transaction(c => (c || 0) + 1);
                }
            },

            openChat(id, title, isPri) {
                this.activeID = id; this.isPrivate = isPri;
                document.getElementById('chatWindow').classList.add('open');
                document.getElementById('chatTitle').innerText = title;
                let path = isPri ? this.getDMPath(this.user.username, id) : 'messages/' + id;
                db.ref(path).off();
                db.ref(path).on('value', s => {
                    const box = document.getElementById('chatMsgs');
                    box.innerHTML = '';
                    s.forEach(child => {
                        const d = child.val();
                        const isMe = d.sender === this.user.username;
                        const content = d.type === 'image' ? `<img src="${d.text}">` : d.text;
                        box.innerHTML += `<div class="bubble ${isMe ? 'sent' : 'received'}"><strong>@${d.sender}</strong><br>${content}</div>`;
                    });
                    box.scrollTop = box.scrollHeight;
                });
            },

            sendTextMsg() {
                const txt = document.getElementById('msgInput').value.trim();
                if(!txt) return;
                this.pushMsg(txt, 'text');
                document.getElementById('msgInput').value = '';
            },

            sendImage(e) {
                const file = e.target.files[0];
                if(!file) return;
                const r = new FileReader();
                r.onload = (ev) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        canvas.width = 600; canvas.height = (img.height * 600) / img.width;
                        canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                        this.pushMsg(canvas.toDataURL('image/jpeg', 0.6), 'image');
                    };
                    img.src = ev.target.result;
                };
                r.readAsDataURL(file);
            },

            pushMsg(content, type) {
                let path = this.isPrivate ? this.getDMPath(this.user.username, this.activeID) : 'messages/' + this.activeID;
                db.ref(path).push({ sender: this.user.username, text: content, type, time: Date.now() });
            },

            getDMPath(u1, u2) {
                const s = [u1, u2].sort();
                return `direct_messages/${s[0]}_${s[1]}`;
            },

            loadMail() {
                db.ref('user_chats/' + this.user.username).on('value', s => {
                    const list = document.getElementById('mailList');
                    list.innerHTML = '';
                    s.forEach(child => {
                        list.innerHTML += `<div class="item-card" onclick="Kivo.openChat('${child.key}', '@${child.key}', true)">@${child.key}</div>`;
                    });
                });
            },

            loadTrending() {
                db.ref('channels').once('value', s => {
                    const grid = document.getElementById('trendGrid');
                    let arr = []; s.forEach(c => arr.push(c.val()));
                    arr.sort((a,b) => (b.subCount || 0) - (a.subCount || 0));
                    grid.innerHTML = '';
                    arr.forEach((c, i) => grid.innerHTML += `<div class="item-card">#${i+1} ${c.name} <span>${c.subCount}</span></div>`);
                });
            },

            loadMyProfile() {
                db.ref('users/' + this.user.username).on('value', s => {
                    const d = s.val();
                    if(d) {
                        document.getElementById('my_p_name').innerText = d.name || this.user.username;
                        document.getElementById('in_name').value = d.name || '';
                        document.getElementById('in_img').value = d.avatar || '';
                        if(d.avatar) document.getElementById('my_p_img').innerHTML = `<img src="${d.avatar}" style="width:100%; height:100%; object-fit:cover;">`;
                    }
                });
            },

            saveProfile() {
                db.ref('users/' + this.user.username).update({
                    name: document.getElementById('in_name').value,
                    avatar: document.getElementById('in_img').value
                }).then(() => alert("تم التحديث"));
            },

            closeChat() { document.getElementById('chatWindow').classList.remove('open'); }
        };

        Kivo.init();
    </script>
</body>
</html>
